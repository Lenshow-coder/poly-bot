polymarket:
  clob_url: "https://clob.polymarket.com"
  gamma_url: "https://gamma-api.polymarket.com"
  data_url: "https://data-api.polymarket.com"
  chain_id: 137
  signature_type: 1

polygon:
  rpc_urls:
    - "https://polygon-mainnet.g.alchemy.com/v2/NdAQfmIpVmaNje7LN5mLn"
    - "https://polygon-rpc.com"
    - "https://rpc.ankr.com/polygon"
    - "https://polygon.llamarpc.com"
  usdc_address: "0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359"

contracts:
  exchange: "0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E"
  neg_risk_exchange: "0xC5d563A36AE78145C45a50134d48A1215220f80a"
  ctf: "0x4D97DCd97eC945f40cF65F87097ACe5EA0476045"

engine:
  default_order_type: "FOK"
  dry_run: false

risk:
  kelly_bankroll: 500
  max_event_exposure: 200
  max_portfolio_exposure: 500
  min_balance: 50
  min_bankroll: 200

# Global defaults for trade params. Every plugin inherits these unless it
# overrides a specific key in its own trade_params section.
trade_defaults:
  edge_threshold: 0.10
  max_outcome_exposure: 300
  kelly_fraction: 0.25
  min_bet_size: 5
  max_bet_size: 50
  order_type: "FOK"
  min_sources: 3
  cooldown_minutes: 30
  price_range: [0.03, 0.95]

# Global defaults for sportsbook weights. Plugins inherit these and can
# override individual book weights in their own sportsbook_weights section.
# Names must be lowercase (CSV scraper lowercases on read).
sportsbook_weight_defaults:
  bet365: 2.0
  draftkings: 1.0
  fanduel: 1.0
  betmgm: 1.0
  betrivers: 1.0
  caesars: 1.0
  thescore: 1.0

scrapers:
  - name: csv
    interval: 60
    path: "data/normalized_odds.csv"

enabled_markets:
  - nhl_stanley_cup

logging:
  level: "INFO"
  console: true
