polymarket:
  clob_url: https://clob.polymarket.com
  gamma_url: https://gamma-api.polymarket.com
  data_url: https://data-api.polymarket.com
  chain_id: 137
  signature_type: 1
polygon:
  rpc_urls:
  - https://polygon-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}
  - https://polygon-rpc.com
  - https://rpc.ankr.com/polygon
  - https://polygon.llamarpc.com
  usdc_address: '0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359'
contracts:
  exchange: '0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E'
  neg_risk_exchange: '0xC5d563A36AE78145C45a50134d48A1215220f80a'
  ctf: '0x4D97DCd97eC945f40cF65F87097ACe5EA0476045'
engine:
  dry_run: true
  position_sync_interval: 60
  loop_error_backoff_seconds: 5
  precheck_liquidity: false
  trade_log_path: data/trades.csv
  max_scrape_age_seconds: 600
  ws_enabled: false
  ws_ping_interval: 20
  mark_cooldown_on_reject: true
  reject_cooldown_minutes: 5
risk:
  kelly_bankroll: 2000.0
  max_event_exposure: 200.0
  max_portfolio_exposure: 500.0
  min_balance: 50
  min_bankroll: 200
  reconcile_tolerance_pct: 0.05
  size_clip_enabled: true
  reconcile_local_fill_grace_seconds: 30
  reconcile_empty_sync_threshold: 2
  reconcile_missing_sync_threshold: 2
trade_defaults:
  edge_threshold: 0.1
  max_outcome_exposure: 200
  kelly_fraction: 0.25
  min_bet_size: 10.0
  max_bet_size: 100.0
  order_type: FAK
  min_sources: 2
  cooldown_minutes: 30
  price_range:
  - 0.01
  - 0.66
  sportsbook_buffer: 0.05
sportsbook_weight_defaults:
  draftkings: 1.0
  fanduel: 2.0
  betmgm: 1.0
  betrivers: 1.0
  bet365: 1.0
  caesars: 1.0
  thescore: 1.0
sportsbook_signals:
  enabled: true
  edge_threshold: 0.1
  abs_edge_threshold: 0.01
  min_sources: 3
scrapers:
- name: csv
  interval: 300
  path: data/normalized_odds.csv
enabled_markets:
- nhl_stanley_cup
logging:
  level: INFO
  console: true
